name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        # Note: next build is intentionally omitted here.
        # Vercel runs the production build with all required secrets (Clerk, Supabase, Sentry).
        # Running next build in CI without those secrets causes prerender failures on
        # authenticated pages — a false negative that doesn't reflect production behaviour.
